<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Logo Gradient -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Round Icon Container -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  <rect width="496" height="496" x="8" y="8" rx="120" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8" />

  <g transform="translate(64, 64)" filter="url(#glow)">
    <!-- Graduation Cap / Diamond base -->
    <path d="M192 48 L352 128 L192 208 L32 128 Z" fill="url(#logo-grad)" />
    
    <!-- Cap Neck / Tassel holder -->
    <path d="M96 160 V224 C96 256, 288 256, 288 224 V160" fill="none" stroke="url(#logo-grad)" stroke-width="24" stroke-linecap="round" />
    
    <!-- Tassel -->
    <path d="M304 135 V240 L320 256" fill="none" stroke="#ec4899" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Code Brackets (Tech aspect overlay) -->
    <!-- Left Bracket -->
    <path d="M100 280 L40 330 L100 380" fill="none" stroke="#6366f1" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Right Bracket -->
    <path d="M284 280 L344 330 L284 380" fill="none" stroke="#ec4899" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>